services:
  api:
    build:
      context: .
      dockerfile: demo/Dockerfile.api
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    environment:
      - API_INTERNAL_URL=http://api:8000
    depends_on:
      - api